<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    :root[data-theme="light"] {
      --bg: #f5f2ed;
      --surface: #ffffff;
      --surface2: #f0ede8;
      --text: #1a1714;
      --text-muted: #7a736a;
      --accent: #c17f3e;
      --accent-soft: #f0e4d0;
      --border: #e0d9d0;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.12);
      --input-bg: #faf8f5;
      --toggle-bg: #e0d9d0;
    }
    :root[data-theme="dark"] {
      --bg: #151210;
      --surface: #1e1a17;
      --surface2: #261f1a;
      --text: #f0ebe3;
      --text-muted: #8a7e74;
      --accent: #d4945a;
      --accent-soft: #2e2018;
      --border: #332a22;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.5);
      --input-bg: #261f1a;
      --toggle-bg: #332a22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.4s, color 0.4s;
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .logo-group { display: flex; flex-direction: column; }
    .logo-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .logo-sub {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 2px;
    }

    /* Toggle */
    .theme-toggle {
      background: var(--toggle-bg);
      border: none;
      border-radius: 20px;
      padding: 6px;
      cursor: pointer;
      width: 52px;
      height: 28px;
      position: relative;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="dark"] .theme-toggle::after { transform: translateX(24px); }
    .toggle-icons {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 6px;
      right: 6px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      pointer-events: none;
    }

    /* Card */
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 28px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: background 0.4s, border-color 0.4s;
    }

    /* Input group */
    .input-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .row { display: flex; gap: 12px; }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 14px;
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      width: 100%;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .unit {
      padding: 0 14px 0 0;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    /* Sex selector */
    .sex-group { display: flex; gap: 8px; }
    .sex-btn {
      flex: 1;
      padding: 11px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--input-bg);
      color: var(--text-muted);
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .sex-btn:hover { border-color: var(--accent); color: var(--text); }
    .sex-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* Calculate button */
    .calc-btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Noto Sans Thai', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 4px;
    }
    .calc-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(193,127,62,0.35); }
    .calc-btn:active { transform: translateY(0); }

    /* Result */
    .result-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 24px 28px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: none;
      flex-direction: column;
      gap: 20px;
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
      transition: background 0.4s, border-color 0.4s;
    }
    .result-card.visible { display: flex; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bmi-number {
      font-family: 'DM Serif Display', serif;
      font-size: 3.6rem;
      line-height: 1;
      color: var(--result-color, var(--accent));
      transition: color 0.4s;
    }
    .bmi-label-group { text-align: right; }
    .bmi-label {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--result-color, var(--accent));
    }
    .bmi-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 4px;
      max-width: 160px;
      line-height: 1.5;
    }

    /* Bar chart */
    .chart-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chart-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bar-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      width: 72px;
      flex-shrink: 0;
      line-height: 1.3;
    }
    .bar-track {
      flex: 1;
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: visible;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0;
      transition: width 0.7s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bar-val {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }
    /* marker on active bar */
    .bar-track .marker {
      position: absolute;
      top: 50%;
      transform: translateY(-50%) translateX(-50%);
      width: 14px;
      height: 14px;
      background: var(--result-color, var(--accent));
      border-radius: 50%;
      border: 2px solid var(--surface);
      transition: left 0.7s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    /* Info strip */
    .info-strip {
      display: flex;
      gap: 10px;
    }
    .info-pill {
      flex: 1;
      background: var(--surface2);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border: 1px solid var(--border);
    }
    .pill-key {
      font-size: 0.66rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }
    .pill-val {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
    }

    /* Ranges legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
    }

    /* Footer */
    .footer {
      text-align: center;
      font-size: 0.68rem;
      color: var(--text-muted);
      padding-bottom: 4px;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="logo-group">
      <span class="logo-title">BMI</span>
      <span class="logo-sub">Health Calculator</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <div class="toggle-icons"><span>☀️</span><span>🌙</span></div>
    </button>
  </div>

  <!-- Input card -->
  <div class="card">
    <div class="input-section">

      <div class="field">
        <label>เพศ</label>
        <div class="sex-group">
          <button class="sex-btn active" id="btn-male" onclick="setSex('male')">♂ ชาย</button>
          <button class="sex-btn" id="btn-female" onclick="setSex('female')">♀ หญิง</button>
        </div>
      </div>

      <div class="field">
        <label>อายุ</label>
        <div class="input-wrap">
          <input type="number" id="age" placeholder="25" min="1" max="120"/>
          <span class="unit">ปี</span>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>น้ำหนัก</label>
          <div class="input-wrap">
            <input type="number" id="weight" placeholder="65" min="1" max="500" step="0.1"/>
            <span class="unit">กก.</span>
          </div>
        </div>
        <div class="field">
          <label>ส่วนสูง</label>
          <div class="input-wrap">
            <input type="number" id="height" placeholder="170" min="50" max="300"/>
            <span class="unit">ซม.</span>
          </div>
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()">คำนวณ BMI ▸</button>
    </div>
  </div>

  <!-- Result card -->
  <div class="result-card" id="resultCard">

    <div class="result-top">
      <div class="bmi-number" id="bmiNum">—</div>
      <div class="bmi-label-group">
        <div class="bmi-label" id="bmiLabel">—</div>
        <div class="bmi-desc" id="bmiDesc">—</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Range bar chart -->
    <div class="chart-area">
      <div class="chart-title">เกณฑ์ BMI (WHO สำหรับเอเชีย)</div>

      <div class="bar-row">
        <div class="bar-label">ผอมเกินไป<br><span style="color:var(--text);font-size:0.65rem">&lt; 18.5</span></div>
        <div class="bar-track" id="track-thin">
          <div class="bar-fill" id="bar-thin" style="background:#60a5fa;width:0%"></div>
          <div class="marker" id="mk-thin"></div>
        </div>
        <div class="bar-val" id="val-thin">18.5</div>
      </div>

      <div class="bar-row">
        <div class="bar-label">ปกติ<br><span style="color:var(--text);font-size:0.65rem">18.5–22.9</span></div>
        <div class="bar-track" id="track-normal">
          <div class="bar-fill" id="bar-normal" style="background:#34d399;width:0%"></div>
          <div class="marker" id="mk-normal"></div>
        </div>
        <div class="bar-val" id="val-normal">22.9</div>
      </div>

      <div class="bar-row">
        <div class="bar-label">น้ำหนักเกิน<br><span style="color:var(--text);font-size:0.65rem">23–24.9</span></div>
        <div class="bar-track" id="track-over">
          <div class="bar-fill" id="bar-over" style="background:#fbbf24;width:0%"></div>
          <div class="marker" id="mk-over"></div>
        </div>
        <div class="bar-val" id="val-over">24.9</div>
      </div>

      <div class="bar-row">
        <div class="bar-label">อ้วน<br><span style="color:var(--text);font-size:0.65rem">25–29.9</span></div>
        <div class="bar-track" id="track-obese1">
          <div class="bar-fill" id="bar-obese1" style="background:#fb923c;width:0%"></div>
          <div class="marker" id="mk-obese1"></div>
        </div>
        <div class="bar-val" id="val-obese1">29.9</div>
      </div>

      <div class="bar-row">
        <div class="bar-label">อ้วนมาก<br><span style="color:var(--text);font-size:0.65rem">≥ 30</span></div>
        <div class="bar-track" id="track-obese2">
          <div class="bar-fill" id="bar-obese2" style="background:#f87171;width:0%"></div>
          <div class="marker" id="mk-obese2"></div>
        </div>
        <div class="bar-val" id="val-obese2">30+</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Info pills -->
    <div class="info-strip">
      <div class="info-pill">
        <span class="pill-key">น้ำหนักที่เหมาะสม</span>
        <span class="pill-val" id="idealRange">—</span>
      </div>
      <div class="info-pill">
        <span class="pill-key">ผลต่าง</span>
        <span class="pill-val" id="weightDiff">—</span>
      </div>
      <div class="info-pill">
        <span class="pill-key">BMI ของคุณ</span>
        <span class="pill-val" id="bmiMini">—</span>
      </div>
    </div>

  </div>

  <div class="footer">ข้อมูลนี้เป็นเพียงการประมาณการเบื้องต้น ควรปรึกษาแพทย์เพื่อการวินิจฉัยที่แม่นยำ</div>
</div>

<script>
  let selectedSex = 'male';

  function setSex(sex) {
    selectedSex = sex;
    document.getElementById('btn-male').classList.toggle('active', sex === 'male');
    document.getElementById('btn-female').classList.toggle('active', sex === 'female');
  }

  function toggleTheme() {
    const html = document.documentElement;
    html.setAttribute('data-theme', html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }

  const zones = [
    { id: 'thin',   min: 0,    max: 18.5, color: '#60a5fa', pct: 22 },
    { id: 'normal', min: 18.5, max: 23,   color: '#34d399', pct: 28 },
    { id: 'over',   min: 23,   max: 25,   color: '#fbbf24', pct: 16 },
    { id: 'obese1', min: 25,   max: 30,   color: '#fb923c', pct: 20 },
    { id: 'obese2', min: 30,   max: 50,   color: '#f87171', pct: 14 },
  ];

  const categoryInfo = {
    thin:   { label: 'ผอมเกินไป',   color: '#60a5fa', desc: 'น้ำหนักน้อยกว่าเกณฑ์ปกติ ควรเพิ่มพลังงานและโปรตีน' },
    normal: { label: 'น้ำหนักปกติ', color: '#34d399', desc: 'อยู่ในเกณฑ์สุขภาพดี รักษาพฤติกรรมการกินและออกกำลังกาย' },
    over:   { label: 'น้ำหนักเกิน', color: '#fbbf24', desc: 'ใกล้เคียงขอบเกณฑ์ ควรระวังอาหารและเพิ่มการออกกำลังกาย' },
    obese1: { label: 'อ้วน',         color: '#fb923c', desc: 'ควรปรับพฤติกรรมการกินและออกกำลังกาย ปรึกษาแพทย์' },
    obese2: { label: 'อ้วนมาก',     color: '#f87171', desc: 'มีความเสี่ยงสูง ควรพบแพทย์เพื่อวางแผนลดน้ำหนัก' },
  };

  function getCategory(bmi) {
    if (bmi < 18.5) return 'thin';
    if (bmi < 23)   return 'normal';
    if (bmi < 25)   return 'over';
    if (bmi < 30)   return 'obese1';
    return 'obese2';
  }

  function calculate() {
    const w = parseFloat(document.getElementById('weight').value);
    const h = parseFloat(document.getElementById('height').value);
    const age = parseFloat(document.getElementById('age').value);

    if (!w || !h || w <= 0 || h <= 0) {
      alert('กรุณากรอกน้ำหนักและส่วนสูงให้ถูกต้อง');
      return;
    }

    const hm = h / 100;
    const bmi = w / (hm * hm);
    const cat = getCategory(bmi);
    const info = categoryInfo[cat];

    // Ideal weight range (BMI 18.5–22.9)
    const idealMin = (18.5 * hm * hm).toFixed(1);
    const idealMax = (22.9 * hm * hm).toFixed(1);
    const diff = w - parseFloat(idealMax);
    let diffStr = diff > 0.5 ? `+${diff.toFixed(1)} กก. (เกิน)` :
                  diff < -0.5 ? `${diff.toFixed(1)} กก. (ขาด)` : 'อยู่ในเกณฑ์ ✓';

    // Set CSS variable
    document.documentElement.style.setProperty('--result-color', info.color);

    document.getElementById('bmiNum').textContent = bmi.toFixed(1);
    document.getElementById('bmiLabel').textContent = info.label;
    document.getElementById('bmiDesc').textContent = info.desc;
    document.getElementById('idealRange').textContent = `${idealMin}–${idealMax} กก.`;
    document.getElementById('weightDiff').textContent = diffStr;
    document.getElementById('bmiMini').textContent = bmi.toFixed(2);

    // Show card
    const card = document.getElementById('resultCard');
    card.classList.remove('visible');
    void card.offsetWidth;
    card.classList.add('visible');

    // Animate bars
    setTimeout(() => {
      zones.forEach(z => {
        const fill = document.getElementById('bar-' + z.id);
        const marker = document.getElementById('mk-' + z.id);
        const track = document.getElementById('track-' + z.id);

        // Does bmi fall in this zone?
        if (bmi >= z.min && bmi < z.max) {
          const progress = Math.min((bmi - z.min) / (z.max - z.min), 1);
          const pct = progress * z.pct;
          fill.style.width = pct + '%';
          marker.style.opacity = '1';
          marker.style.left = (progress * 100) + '%';
        } else if (bmi >= z.max) {
          fill.style.width = z.pct + '%';
          marker.style.opacity = '0';
        } else {
          fill.style.width = '0%';
          marker.style.opacity = '0';
        }
      });
    }, 80);
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>
</body>
</html>
